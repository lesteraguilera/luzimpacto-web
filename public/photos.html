<!doctype html>
<html lang="es"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>LUZ — Catálogo de fotos</title>
<style>
  body { font-family: -apple-system, sans-serif; background:#1F2125; color:#FAF7F2; margin:0; padding:24px; }
  h1 { font-family: Georgia, serif; color:#FCD34D; margin:0 0 8px; }
  .sub { opacity:.7; margin:0 0 24px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:16px; }
  .card { background:#2a2c30; border-radius:8px; overflow:hidden; }
  .card img { width:100%; height:220px; object-fit:cover; display:block; }
  .card .meta { padding:10px 12px; font-size:13px; }
  .num { color:#FCD34D; font-weight:700; font-size:18px; }
  .pick { background:#FCD34D; color:#1F2125; padding:2px 6px; border-radius:4px; font-size:11px; font-weight:600; margin-left:6px; }
  .samuel { background:#22c55e; color:white; padding:2px 6px; border-radius:4px; font-size:11px; font-weight:600; margin-left:6px; }
</style></head>
<body>
<h1>LUZ Impacto — Catálogo visual</h1>
<p class="sub">30 fotos · #1-#22 procesadas · #23-#30 nuevas (DNG profesionales) · faltan ~33 DNG por bajar</p>
<div class="grid" id="g"></div>
<script>

  {n:12, t:"Equipo joven en aula con banner LUZ", tag:""},

const titles = ["f0ea7dd9-2ca5-4611-b655-99c45c535db5","d6597a89-9112-4cf5-be43-0cd9c1205ffc","17BEA455-8F61-4C8A-90AC-F57D6AF16B7C","D9E1BEA6-4DD4-4CD9-ACB6-B2D9B7B361D4","IMG_4843","IMG_4834","IMG_4824","IMG_4829","7299b820-d22e-4ea1-8011-1d3f54862bcf","a316c362-e0a7-4ce9-b874-122c0a7eee6a","6cfebcd5-c260-4dc4-915a-78f67c2b66e8","048b403d-a267-4228-95d4-5412045d3a9a","a19dd697-a37d-4298-a0ef-bbea97930050","f0c8a3e6-31d4-4701-a73e-8c616a5895df","a71879ec-8f43-489e-8ecb-33b76149d913","e72b3b7d-aa9a-4939-b4f2-18560ac84b8d","2b96b299-e755-4fc3-a83a-bd62cb1ad8eb","de976589-d4df-488f-8b15-e247205f1d12","a7ad284b-b9de-4383-aeb0-04aebec0e113","77ea2e65-6ae1-46d1-8f9c-fe9e36ceeddf","d78af50e-8078-44d8-a27f-5349b88e0426","IMG_2830","IMG_7606","IMG_7845","IMG_7872","IMG_7920","IMG_7967","IMG_7969","IMG_8014","IMG_8015"];

  g.innerHTML += `<div class="card"><img src="${path}" loading="lazy"><div class="meta"><span class="num">#${f.n}</span> ${tagHtml}<div style="margin-top:6px;opacity:.8;">${f.t}</div></div></div>`;
});
</script>
</body></html>
